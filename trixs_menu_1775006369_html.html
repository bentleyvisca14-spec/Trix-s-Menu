<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trix's Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: linear-gradient(135deg, #000000 0%, #0a0f1e 50%, #050d1f 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header { width: 100%; text-align: center; padding: 60px 20px 30px; }
    .crown { font-size: 2.4rem; display: block; margin-bottom: 8px; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2.5rem, 6vw, 4rem); color: #fff; letter-spacing: 2px; text-shadow: 0 0 40px rgba(59,130,246,0.8); }
    .divider { width: 80px; height: 3px; background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa); border-radius: 99px; margin: 18px auto 0; box-shadow: 0 0 12px rgba(59,130,246,0.7); }
    .shop { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 32px; width: 100%; max-width: 960px; padding: 50px 24px 80px; }
    .card { background: rgba(10,20,40,0.75); border: 1px solid rgba(59,130,246,0.25); border-radius: 24px; backdrop-filter: blur(16px); overflow: hidden; transition: transform 0.3s ease, box-shadow 0.3s ease; position: relative; }
    .card:hover { transform: translateY(-8px); box-shadow: 0 24px 60px rgba(59,130,246,0.4); }
    .card::before { content: ''; display: block; height: 4px; background: linear-gradient(90deg, #1d4ed8, #3b82f6, #60a5fa); box-shadow: 0 0 10px rgba(59,130,246,0.8); }
    .card-image { width: 100%; height: 200px; display: flex; align-items: center; justify-content: center; background: #000; overflow: hidden; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; }
    .badge-free { position: absolute; top: 22px; right: 18px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 0.7rem; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; padding: 4px 12px; border-radius: 99px; box-shadow: 0 4px 14px rgba(16,185,129,0.45); }
    .card-body { padding: 24px 26px 28px; }
    .card-category { font-size: 0.72rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: #60a5fa; margin-bottom: 8px; }
    .card-title { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: #f8fafc; margin-bottom: 10px; }
    .card-footer { display: flex; align-items: center; justify-content: flex-end; }
    .btn { background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; border: none; padding: 10px 22px; border-radius: 12px; font-size: 0.88rem; font-weight: 600; cursor: pointer; transition: opacity 0.2s, transform 0.2s, box-shadow 0.2s; letter-spacing: 0.5px; box-shadow: 0 4px 18px rgba(59,130,246,0.4); }
    .btn:hover { opacity: 0.9; transform: scale(1.04); box-shadow: 0 6px 24px rgba(59,130,246,0.6); }
    .btn:active { transform: scale(0.97); }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); background: linear-gradient(135deg, #1d4ed8, #3b82f6); color: #fff; padding: 14px 28px; border-radius: 14px; font-weight: 600; font-size: 0.92rem; box-shadow: 0 8px 30px rgba(59,130,246,0.5); transition: transform 0.4s cubic-bezier(0.34,1.56,0.64,1); z-index: 999; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    footer { color: rgba(255,255,255,0.2); font-size: 0.78rem; padding-bottom: 30px; letter-spacing: 1px; }
  </style>
</head>
